<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Candela — Mark Options</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #07090f;
  font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 72px 32px;
  gap: 64px;
  min-height: 100vh;
}
h1 { font-size: 10px; letter-spacing: 0.45em; color: #334155; font-weight: normal; text-transform: uppercase; }
.options { display: flex; gap: 88px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
.option { display: flex; flex-direction: column; align-items: center; gap: 24px; }
.sizes { display: flex; align-items: center; gap: 36px; }
.label { font-size: 9px; color: #1e293b; text-align: center; line-height: 2.2; letter-spacing: 0.18em; text-transform: uppercase; }
h3 { font-size: 9px; color: #64748b; letter-spacing: 0.35em; font-weight: normal; text-transform: uppercase; }
</style>
</head>
<body>
<h1>candela — mark options</h1>
<div class="options">

<!-- ══════════════════════════════════════════════
     01 — GAUGE
     Precision arc instrument. Sun dot at solar noon.
     Tick marks at 8/10/2/4 o'clock positions.
═══════════════════════════════════════════════ -->
<div class="option">
  <h3>01 — gauge</h3>
  <div class="sizes">

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="128" height="128">
      <defs>
        <filter id="gA"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="sA" cx="38%" cy="32%" r="65%">
          <stop offset="0%" stop-color="#fefce8"/>
          <stop offset="55%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#f59e0b"/>
        </radialGradient>
      </defs>

      <!-- Outer glow behind sun -->
      <circle cx="24" cy="11" r="7" fill="#f59e0b" opacity="0.1" filter="url(#gA)"/>

      <!-- Faint inner reference ring -->
      <circle cx="24" cy="27" r="12" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.12"/>

      <!-- Main gauge arc: centre(24,27), r=16, 8 o'clock → 4 o'clock clockwise through top -->
      <!-- 8 o'clock (θ=150°): (10.1, 35)   4 o'clock (θ=30°): (37.9, 35) -->
      <path d="M 10.1,35 A 16,16 0 1 1 37.9,35"
            fill="none" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/>

      <!-- Tick marks: inward from arc edge (r=16→r=12.5) -->
      <!-- 10 o'clock θ=210°: outer(10.1,19) inner(12.9,20.6) -->
      <line x1="10.1" y1="19" x2="12.9" y2="20.6" stroke="#f59e0b" stroke-width="1.1" stroke-linecap="round"/>
      <!-- 2 o'clock θ=330°: outer(37.9,19) inner(35.1,20.6) -->
      <line x1="37.9" y1="19" x2="35.1" y2="20.6" stroke="#f59e0b" stroke-width="1.1" stroke-linecap="round"/>
      <!-- 8 o'clock start cap -->
      <line x1="10.1" y1="35" x2="12.9" y2="33.4" stroke="#f59e0b" stroke-width="1.1" stroke-linecap="round"/>
      <!-- 4 o'clock end cap -->
      <line x1="37.9" y1="35" x2="35.1" y2="33.4" stroke="#f59e0b" stroke-width="1.1" stroke-linecap="round"/>

      <!-- Sun at noon (top of arc, θ=270°): (24,11) -->
      <circle cx="24" cy="11" r="3" fill="url(#sA)" filter="url(#gA)"/>

      <!-- Solar targeting crosshair — 4 small dashes outside the sun dot -->
      <g stroke="#fbbf24" stroke-width="0.9" stroke-linecap="round" opacity="0.75">
        <line x1="24" y1="5" x2="24" y2="7.2"/>   <!-- up -->
        <line x1="24" y1="14.8" x2="24" y2="17"/> <!-- down -->
        <line x1="18" y1="11" x2="20.2" y2="11"/> <!-- left -->
        <line x1="27.8" y1="11" x2="30" y2="11"/> <!-- right -->
      </g>
    </svg>

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
      <defs>
        <filter id="gAs"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="sAs" cx="38%" cy="32%" r="65%">
          <stop offset="0%" stop-color="#fefce8"/>
          <stop offset="55%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#f59e0b"/>
        </radialGradient>
      </defs>
      <circle cx="24" cy="11" r="7" fill="#f59e0b" opacity="0.1" filter="url(#gAs)"/>
      <circle cx="24" cy="27" r="12" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.12"/>
      <path d="M 10.1,35 A 16,16 0 1 1 37.9,35" fill="none" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="10.1" y1="19" x2="12.9" y2="20.6" stroke="#f59e0b" stroke-width="1.1" stroke-linecap="round"/>
      <line x1="37.9" y1="19" x2="35.1" y2="20.6" stroke="#f59e0b" stroke-width="1.1" stroke-linecap="round"/>
      <line x1="10.1" y1="35" x2="12.9" y2="33.4" stroke="#f59e0b" stroke-width="1.1" stroke-linecap="round"/>
      <line x1="37.9" y1="35" x2="35.1" y2="33.4" stroke="#f59e0b" stroke-width="1.1" stroke-linecap="round"/>
      <circle cx="24" cy="11" r="3" fill="url(#sAs)" filter="url(#gAs)"/>
      <g stroke="#fbbf24" stroke-width="0.9" stroke-linecap="round" opacity="0.75">
        <line x1="24" y1="5" x2="24" y2="7.2"/>
        <line x1="24" y1="14.8" x2="24" y2="17"/>
        <line x1="18" y1="11" x2="20.2" y2="11"/>
        <line x1="27.8" y1="11" x2="30" y2="11"/>
      </g>
    </svg>
  </div>
  <div class="label">arc gauge<br>solar noon at apex</div>
</div>


<!-- ══════════════════════════════════════════════
     02 — IRRADIANCE
     Polar bar chart: sun at centre, 5 radial bars
     tallest at solar noon, shorter toward horizon.
     References the app's core data output.
═══════════════════════════════════════════════ -->
<div class="option">
  <h3>02 — irradiance</h3>
  <div class="sizes">

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="128" height="128">
      <defs>
        <filter id="gB"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="sB" cx="38%" cy="32%" r="65%">
          <stop offset="0%" stop-color="#fefce8"/>
          <stop offset="55%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#f59e0b"/>
        </radialGradient>
      </defs>

      <!-- Background glow at solar noon bar -->
      <line x1="24" y1="17" x2="24" y2="6" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" opacity="0.06" filter="url(#gB)"/>

      <!-- Baseline arc connecting bar roots: r=8, θ=200°→340° through 270° -->
      <!-- θ=200°: (24+8*cos200°, 24+8*sin200°) = (24-7.52, 24-2.74) = (16.5, 21.3) -->
      <!-- θ=340°: (24+8*cos340°, 24+8*sin340°) = (24+7.52, 24-2.74) = (31.5, 21.3) -->
      <path d="M 16.5,21.3 A 8,8 0 0 1 31.5,21.3"
            fill="none" stroke="#f59e0b" stroke-width="0.7" opacity="0.3"/>

      <!-- 5 radial irradiance bars (sun at centre r=0, bars from r=8 outward) -->
      <!-- θ=200° dawn:   (16.5,21.3)→(13.0,20.2)  Δr=3.5 -->
      <line x1="16.5" y1="21.3" x2="13.0" y2="20.2" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
      <!-- θ=235° morning: (19.4,17.5)→(15.3,14.4)  Δr=5.5 -->
      <line x1="19.4" y1="17.5" x2="15.3" y2="14.4" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
      <!-- θ=270° noon:    (24,16)→(24,6)             Δr=10 -->
      <line x1="24" y1="16" x2="24" y2="6" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" filter="url(#gB)"/>
      <!-- θ=305° afternoon: (28.6,17.5)→(32.7,14.4) Δr=5.5 -->
      <line x1="28.6" y1="17.5" x2="32.7" y2="14.4" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
      <!-- θ=340° dusk:   (31.5,21.3)→(35.0,20.2)   Δr=3.5 -->
      <line x1="31.5" y1="21.3" x2="35.0" y2="20.2" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>

      <!-- Centre sun -->
      <circle cx="24" cy="24" r="5.5" fill="url(#sB)" filter="url(#gB)"/>
      <!-- Sun inner highlight -->
      <circle cx="22.5" cy="22.5" r="2" fill="#fefce8" opacity="0.5"/>
    </svg>

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
      <defs>
        <filter id="gBs"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="sBs" cx="38%" cy="32%" r="65%">
          <stop offset="0%" stop-color="#fefce8"/>
          <stop offset="55%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#f59e0b"/>
        </radialGradient>
      </defs>
      <path d="M 16.5,21.3 A 8,8 0 0 1 31.5,21.3" fill="none" stroke="#f59e0b" stroke-width="0.7" opacity="0.3"/>
      <line x1="16.5" y1="21.3" x2="13.0" y2="20.2" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
      <line x1="19.4" y1="17.5" x2="15.3" y2="14.4" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
      <line x1="24" y1="16" x2="24" y2="6" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" filter="url(#gBs)"/>
      <line x1="28.6" y1="17.5" x2="32.7" y2="14.4" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
      <line x1="31.5" y1="21.3" x2="35.0" y2="20.2" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
      <circle cx="24" cy="24" r="5.5" fill="url(#sBs)" filter="url(#gBs)"/>
      <circle cx="22.5" cy="22.5" r="2" fill="#fefce8" opacity="0.5"/>
    </svg>
  </div>
  <div class="label">polar irradiance<br>day-arc as bar chart</div>
</div>


<!-- ══════════════════════════════════════════════
     03 — HORIZON
     Minimal. Horizon line + solar path arc.
     Sun at noon. Dashed meridian. That's it.
═══════════════════════════════════════════════ -->
<div class="option">
  <h3>03 — horizon</h3>
  <div class="sizes">

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="128" height="128">
      <defs>
        <filter id="gC"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="sC" cx="38%" cy="32%" r="65%">
          <stop offset="0%" stop-color="#fefce8"/>
          <stop offset="55%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#f59e0b"/>
        </radialGradient>
      </defs>

      <!-- Sun glow -->
      <circle cx="24" cy="17" r="8" fill="#f59e0b" opacity="0.08" filter="url(#gC)"/>

      <!-- Solar path arc: centre(24,32), r=15, left(9,32)→right(39,32) above horizon -->
      <path d="M 9,32 A 15,15 0 0 1 39,32"
            fill="none" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/>

      <!-- Horizon line -->
      <line x1="6" y1="32" x2="42" y2="32" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/>

      <!-- Horizon end ticks (perpendicular to line) -->
      <line x1="6" y1="29.5" x2="6" y2="34.5" stroke="#f59e0b" stroke-width="1" stroke-linecap="round"/>
      <line x1="42" y1="29.5" x2="42" y2="34.5" stroke="#f59e0b" stroke-width="1" stroke-linecap="round"/>

      <!-- Dashed meridian: from sun down to horizon -->
      <line x1="24" y1="19.5" x2="24" y2="31.5"
            stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="2,2.5" opacity="0.4"/>

      <!-- Sun at noon (top of arc) -->
      <circle cx="24" cy="17" r="3.2" fill="url(#sC)" filter="url(#gC)"/>

      <!-- Tick marks at 45° positions on arc -->
      <!-- θ=225° (NW): outer(24+15*cos225°, 32+15*sin225°)=(13.4,21.4) inner r=11: (16.2,24.2) -->
      <line x1="13.4" y1="21.4" x2="16.2" y2="24.2" stroke="#f59e0b" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      <!-- θ=315° (NE): outer(34.6,21.4) inner(31.8,24.2) -->
      <line x1="34.6" y1="21.4" x2="31.8" y2="24.2" stroke="#f59e0b" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    </svg>

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
      <defs>
        <filter id="gCs"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="sCs" cx="38%" cy="32%" r="65%">
          <stop offset="0%" stop-color="#fefce8"/>
          <stop offset="55%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#f59e0b"/>
        </radialGradient>
      </defs>
      <circle cx="24" cy="17" r="8" fill="#f59e0b" opacity="0.08" filter="url(#gCs)"/>
      <path d="M 9,32 A 15,15 0 0 1 39,32" fill="none" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="6" y1="32" x2="42" y2="32" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="6" y1="29.5" x2="6" y2="34.5" stroke="#f59e0b" stroke-width="1" stroke-linecap="round"/>
      <line x1="42" y1="29.5" x2="42" y2="34.5" stroke="#f59e0b" stroke-width="1" stroke-linecap="round"/>
      <line x1="24" y1="19.5" x2="24" y2="31.5" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="2,2.5" opacity="0.4"/>
      <circle cx="24" cy="17" r="3.2" fill="url(#sCs)" filter="url(#gCs)"/>
      <line x1="13.4" y1="21.4" x2="16.2" y2="24.2" stroke="#f59e0b" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      <line x1="34.6" y1="21.4" x2="31.8" y2="24.2" stroke="#f59e0b" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    </svg>
  </div>
  <div class="label">solar horizon<br>path arc + meridian</div>
</div>

</div>
</body>
</html>
